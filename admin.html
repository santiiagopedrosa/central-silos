    <style>
        :root { --yellow: #f4ea8c; --dark: #0a0a0a; --card: #161616; --red: rgba(255, 77, 77, 0.8); }
        body { background-color: var(--dark); color: white; font-family: sans-serif; margin: 0; }
        
        /* Navbar fix */
        #navbar { position: fixed; top:0; width: 100%; z-index: 100; background: var(--dark); border-bottom: 1px solid #222; }

        /* Lock Screen */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .lock-box { background: var(--card); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #333; }
        
        /* Layout Admin */
        .admin-container { padding: 100px 20px 40px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .admin-card { background: var(--card); padding: 25px; border-radius: 15px; width: 100%; max-width: 500px; text-align: center; border: 1px solid #333; margin-bottom: 20px; overflow: hidden; }
        
        input[type="file"] { display: none; }
        .btn-yellow { background: var(--yellow); color: black; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; display: inline-block; margin-top: 10px; }
        
        /* Grelha de Gestão */
        .gestao-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            width: 100%;
            margin-top: 20px;
        }
        
        .foto-item {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid #333;
            background: #000;
        }

        .foto-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
        
        /* Overlay Vermelho com a Cruz */
        .foto-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--red); display: flex; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s ease; z-index: 10;
        }

        .btn-delete {
            background: none; border: none; color: white !important;
            font-size: 60px; font-weight: 100; cursor: pointer;
            line-height: 1; font-family: Arial, sans-serif;
            transition: transform 0.2s ease;
        }

       
        .btn-delete:hover { transform: scale(1.2); }

        /* Remove ou substitui a regra @media anterior por esta */
@media (max-width: 600px) {
    .gestao-grid { grid-template-columns: repeat(2, 1fr); }
    
    /* No mobile, o overlay só aparece quando a classe .active for adicionada */
    .foto-item.active .foto-overlay {
        opacity: 1;
    }
}

/* Garante que o overlay bloqueia cliques na imagem por trás quando ativo */
.foto-overlay {
    pointer-events: none; /* Desativado por padrão */
}

.foto-item.active .foto-overlay,
.foto-item:hover .foto-overlay {
    opacity: 1;
    pointer-events: auto; /* Ativa os cliques quando visível */
}
    </style>
</head>
