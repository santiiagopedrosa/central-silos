<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum Central Silos | Caldas da Rainha</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="imagem_centralsilos-removebg-preview.png?v=2" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="album-body">

     <nav id="navbar">
        <div class="nav-container">
            <a href="index.html">
                <img src="imagem_centralsilos.jpg" alt="Logo" class="logo-img">
            </a>
            <ul class="nav-list">
                <li><a href="index.html">Home</a></li>
                <li><a href="album.html">Momentos</a></li>
                <li><a href="admin.html">Admin</a></li>
            </ul>
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <header class="album-intro">
        <h1 class="scroll-reveal">GALERIA <span>SILOS</span></h1>
        <p class="scroll-reveal">O recap visual das melhores noites das Caldas.</p>
    </header>

    <section class="album-wrapper">
        <div id="grid-principal" class="photo-grid"></div>

        <div id="status-carregamento" style="text-align:center; color:#666; margin-top:20px;">
            A procurar novas fotos...
        </div>

        <div id="container-carregar-mais" style="text-align:center; margin: 40px 0; display: none;">
            <button id="btn-carregar-mais" onclick="carregarMaisFotos()" class="btn-mais">
                MOSTRAR MAIS MOMENTOS
            </button>
        </div>
    </section>

    <div id="foto-modal" class="modal" onclick="fecharModal()">
        <span class="fechar-modal">&times;</span>
        <div class="modal-wrapper" onclick="event.stopPropagation()">
            <img class="modal-conteudo" id="img-full">
            <button id="btn-download-modal" class="btn-download-grande" style="margin-top: 20px; cursor: pointer;">
                BAIXAR FOTO
            </button>
        </div>
    </div>

    <footer class="album-footer">
        <p>BAR CENTRAL SILOS • 2026</p>
    </footer>

    <script src="script.js"></script>

    <script>
        const SUPABASE_URL = 'https://ndhdrupwndquqdkafscx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kaGRydXB3bmRxdXFka2Fmc2N4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE0MjIsImV4cCI6MjA5MjUyNzQyMn0.r6nfXXCiRaHAJgjb70Jmq_yzVTBpf417H0ygvoD3EbM';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let offsetGlobal = 0;
        const limitePorCarga = 100;

        async function carregarFotosDoStorage(reset = true) {
            const grid = document.getElementById('grid-principal');
            const status = document.getElementById('status-carregamento');
            const btnContainer = document.getElementById('container-carregar-mais');

            if (reset) {
                grid.innerHTML = "";
                offsetGlobal = 0;
                status.style.display = "block";
                status.innerText = "A carregar momentos...";
            }

            const { data, error } = await _supabase.storage
                .from('fotos-album')
                .list('', {
                    limit: limitePorCarga,
                    offset: offsetGlobal,
                    sortBy: { column: 'name', order: 'desc' }
                });

            if (error) {
                status.innerText = "Erro ao carregar.";
                return;
            }

            status.style.display = "none";

            if (!data || data.length === 0) {
                if (reset) status.innerText = "Ainda não há fotos.";
                btnContainer.style.display = "none";
                return;
            }

            const fotosAgrupadas = {};
            data.forEach(foto => {
                if (foto.name === ".emptyFolderPlaceholder") return;
                let dataChave = foto.name.includes('__') ? foto.name.split('__')[0] : foto.created_at.split('T')[0];
                if (!fotosAgrupadas[dataChave]) fotosAgrupadas[dataChave] = [];
                fotosAgrupadas[dataChave].push(foto);
            });

            const datasOrdenadas = Object.keys(fotosAgrupadas).sort().reverse();

            datasOrdenadas.forEach(dataTxt => {
                let diaWrapper = document.querySelector(`[data-dia="${dataTxt}"]`);

                if (!diaWrapper) {
                    let dataObj = new Date(dataTxt);
                    let dataExibicao = dataObj.toLocaleDateString('pt-PT', {
                        weekday: 'long', day: 'numeric', month: 'long'
                    });

                    const header = document.createElement('h2');
                    header.className = 'dia-header';
                    header.innerText = dataExibicao;
                    grid.appendChild(header);

                    diaWrapper = document.createElement('div');
                    diaWrapper.className = 'dia-wrapper';
                    diaWrapper.setAttribute('data-dia', dataTxt);
                    grid.appendChild(diaWrapper);
                }

                fotosAgrupadas[dataTxt].forEach(foto => {
                    const { data: { publicUrl } } = _supabase.storage.from('fotos-album').getPublicUrl(foto.name);
                    const card = document.createElement('div');
                    card.className = 'photo-card scroll-reveal active';
                    card.innerHTML = `<img src="${publicUrl}" loading="lazy" onclick="abrirModal('${publicUrl}', '${foto.name}')" style="cursor: pointer;">`;
                    diaWrapper.appendChild(card);
                });
            });

            btnContainer.style.display = data.length === limitePorCarga ? "block" : "none";
        }

        window.carregarMaisFotos = function () {
            offsetGlobal += limitePorCarga;
            carregarFotosDoStorage(false);
        };

        // FUNÇÃO PARA ABRIR MODAL E CONFIGURAR O DOWNLOAD
        window.abrirModal = function (url, filename) {
            const modal = document.getElementById('foto-modal');
            const imgFull = document.getElementById('img-full');
            const btnDownload = document.getElementById('btn-download-modal');

            modal.style.display = "flex";
            imgFull.src = url;
            
            // Força o download ao clicar no botão
            btnDownload.onclick = function() {
                forcarDownload(url, filename || "silos-foto.jpg");
            };
            
            document.body.style.overflow = "hidden";
        }

        window.fecharModal = function () {
            const modal = document.getElementById('foto-modal');
            modal.style.display = "none";
            document.body.style.overflow = "auto";
        }

        // FUNÇÃO QUE REALMENTE FAZ O DOWNLOAD (BLOB)
        async function forcarDownload(url, filename) {
            const btn = document.getElementById('btn-download-modal');
            const textoOriginal = btn.innerText;
            
            try {
                btn.innerText = "A BAIXAR...";
                const resposta = await fetch(url);
                const blob = await resposta.blob();
                const urlBlob = window.URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = urlBlob;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                window.URL.revokeObjectURL(urlBlob);
                btn.innerText = textoOriginal;
            } catch (erro) {
                console.error("Erro:", erro);
                btn.innerText = "ERRO!";
                window.open(url, '_blank'); // Abre em nova aba se falhar
            }
        }

        carregarFotosDoStorage();
    </script>
</body>
</html>
