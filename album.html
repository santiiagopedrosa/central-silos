    <script>
       const SUPABASE_URL = 'https://ndhdrupwndquqdkafscx.supabase.co'; 
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kaGRydXB3bmRxdXFka2Fmc2N4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE0MjIsImV4cCI6MjA5MjUyNzQyMn0.r6nfXXCiRaHAJgjb70Jmq_yzVTBpf417H0ygvoD3EbM';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// VARIÁVEIS DE CONTROLO DE PAGINAÇÃO
let offsetGlobal = 0;
const limitePorCarga = 100;

async function carregarFotosDoStorage(reset = true) {
    const grid = document.getElementById('grid-principal');
    const status = document.getElementById('status-carregamento');
    const btnContainer = document.getElementById('container-carregar-mais');
    
    if (reset) {
        grid.innerHTML = "";
        offsetGlobal = 0;
        status.style.display = "block";
        status.innerText = "A carregar momentos...";
    }

    // Pedir ao Supabase as próximas 100 fotos
    const { data, error } = await _supabase.storage
        .from('fotos-album')
        .list('', { 
            limit: limitePorCarga, 
            offset: offsetGlobal,
            sortBy: { column: 'name', order: 'desc' } // Nome desc garante data__ mais recente
        });

    if (error) {
        status.innerText = "Erro ao carregar.";
        return;
    }

    status.style.display = "none";

    if (!data || data.length === 0) {
        if (reset) status.innerText = "Ainda não há fotos.";
        btnContainer.style.display = "none";
        return;
    }

    // Agrupar as novas fotos por data
    const fotosAgrupadas = {};
    data.forEach(foto => {
        if (foto.name === ".emptyFolderPlaceholder") return;
        let dataChave = foto.name.includes('__') ? foto.name.split('__')[0] : foto.created_at.split('T')[0];
        if (!fotosAgrupadas[dataChave]) fotosAgrupadas[dataChave] = [];
        fotosAgrupadas[dataChave].push(foto);
    });

    // Ordenar e Injetar no HTML
    const datasOrdenadas = Object.keys(fotosAgrupadas).sort().reverse();

    datasOrdenadas.forEach(dataTxt => {
        let diaWrapper = document.querySelector(`[data-dia="${dataTxt}"]`);
        
        // Se não existir o bloco desse dia, cria-o
        if (!diaWrapper) {
            let dataObj = new Date(dataTxt);
            let dataExibicao = dataObj.toLocaleDateString('pt-PT', { 
                weekday: 'long', day: 'numeric', month: 'long' 
            });

            const header = document.createElement('h2');
            header.className = 'dia-header';
            header.innerText = dataExibicao;
            grid.appendChild(header);

            diaWrapper = document.createElement('div');
            diaWrapper.className = 'dia-wrapper';
            diaWrapper.setAttribute('data-dia', dataTxt); // ID para encontrarmos depois
            grid.appendChild(diaWrapper);
        }

        // Localiza esta parte no teu código e substitui:
fotosAgrupadas[dataTxt].forEach(foto => {
    const { data: { publicUrl } } = _supabase.storage.from('fotos-album').getPublicUrl(foto.name);
    const card = document.createElement('div');
    card.className = 'photo-card scroll-reveal active';
    
    // Adicionamos o onclick aqui:
    card.innerHTML = `<img src="${publicUrl}" loading="lazy" onclick="abrirModal('${publicUrl}')" style="cursor: pointer;">`;
    
    diaWrapper.appendChild(card);
});
    });

    // Mostrar botão "Mostrar Mais" se vierem 100 fotos (sinal de que há mais)
    if (data.length === limitePorCarga) {
        btnContainer.style.display = "block";
    } else {
        btnContainer.style.display = "none";
    }

    if (typeof aplicarEfeitoScroll === "function") {
        setTimeout(aplicarEfeitoScroll, 200);
    }
}

// FUNÇÃO PARA O BOTÃO
window.carregarMaisFotos = function() {
    offsetGlobal += limitePorCarga;
    carregarFotosDoStorage(false); // false para não apagar o que já carregou
};

// Inicia a primeira carga
carregarFotosDoStorage();


window.abrirModal = function(url) {
    const modal = document.getElementById('foto-modal');
    const imgFull = document.getElementById('img-full');
    modal.style.display = "flex";
    imgFull.src = url;
    document.body.style.overflow = "hidden"; // Impede o scroll do fundo
}

window.fecharModal = function() {
    const modal = document.getElementById('foto-modal');
    modal.style.display = "none";
    document.body.style.overflow = "auto"; // Devolve o scroll
}

    </script>
    <div id="foto-modal" class="modal" onclick="fecharModal()">
    <span class="fechar-modal">&times;</span>
    <img class="modal-conteudo" id="img-full">
</div>
</body>
