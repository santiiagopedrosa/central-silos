    <script>
        const SUPABASE_URL = 'https://ndhdrupwndquqdkafscx.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kaGRydXB3bmRxdXFka2Fmc2N4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE0MjIsImV4cCI6MjA5MjUyNzQyMn0.r6nfXXCiRaHAJgjb70Jmq_yzVTBpf417H0ygvoD3EbM';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

         
        
        async function carregarFotosDoStorage() {
    const grid = document.getElementById('grid-principal');
    const status = document.getElementById('status-carregamento');
    
    const { data, error } = await _supabase.storage
        .from('fotos-album')
        .list('', { 
            limit: 100, 
            sortBy: { column: 'created_at', order: 'desc' } 
        });

    if (error) {
        console.error("Erro:", error);
        status.innerText = "Erro ao carregar.";
        return;
    }

    if (!data || data.length === 0) {
        status.innerText = "Ainda não há fotos no álbum.";
        return;
    }

    grid.innerHTML = "";
    status.style.display = "none";

    const fotosAgrupadas = {};

    data.forEach(foto => {
        if (foto.name === ".emptyFolderPlaceholder") return;

        let dataChave;
        
        // Verifica se o nome tem o padrão DATA__NOME (ex: 2024-03-20__foto.jpg)
        if (foto.name.includes('__')) {
            dataChave = foto.name.split('__')[0];
        } else {
            // Para fotos antigas, usa a data de criação do ficheiro
            dataChave = foto.created_at.split('T')[0]; 
        }

        if (!fotosAgrupadas[dataChave]) fotosAgrupadas[dataChave] = [];
        fotosAgrupadas[dataChave].push(foto);
    });

    // Ordenar as datas para que as mais recentes apareçam primeiro
    const datasOrdenadas = Object.keys(fotosAgrupadas).sort().reverse();

    // ... dentro da função carregarFotosDoStorage, após ordenar as datas:

datasOrdenadas.forEach(dataTxt => {
    const fotos = fotosAgrupadas[dataTxt];
    
    // 1. Criar o Título
    let dataObj = new Date(dataTxt);
    let dataExibicao = dataObj.toLocaleDateString('pt-PT', { 
        weekday: 'long', day: 'numeric', month: 'long' 
    });

    const header = document.createElement('h2');
    header.className = 'dia-header';
    header.innerText = dataExibicao;
    grid.appendChild(header);

    // 2. Criar a Grelha do Dia
    const diaWrapper = document.createElement('div');
    diaWrapper.className = 'dia-wrapper';

    fotos.forEach(foto => {
        const { data: { publicUrl } } = _supabase.storage.from('fotos-album').getPublicUrl(foto.name);
        
        const card = document.createElement('div');
        card.className = 'photo-card scroll-reveal active';
        card.innerHTML = `<img src="${publicUrl}" loading="lazy">`;
        
        diaWrapper.appendChild(card);
    });

    grid.appendChild(diaWrapper);
});

    if (typeof aplicarEfeitoScroll === "function") {
        setTimeout(aplicarEfeitoScroll, 200);
    }
}

        // Inicia a função
        carregarFotosDoStorage();
        
    // Função que aplica o efeito de observação
    function aplicarEfeitoScroll() {
        const observerOptions = {
            threshold: 0.1 // Ativa quando 10% da imagem está visível
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('reveal');
                    // Se quiseres que a animação aconteça apenas uma vez, desativa o "unobserve":
                    // observer.unobserve(entry.target); 
                } else {
                    // Opcional: Remove a classe para a foto "esconder" outra vez quando sobes a página
                    entry.target.classList.remove('reveal');
                }
            });
        }, observerOptions);

        // Seleciona todas as fotos (estáticas e dinâmicas)
        const photos = document.querySelectorAll('.photo-card');
        photos.forEach(photo => observer.observe(photo));
    }

    document.addEventListener('DOMContentLoaded', function() {
    const btn = document.getElementById('mobile-menu');
    const menu = document.getElementById('nav-list');

    if (btn && menu) {
        btn.onclick = function(e) {
            e.preventDefault();
            btn.classList.toggle('is-active');
            menu.classList.toggle('active');
            console.log("Menu clicado"); // Para testares no PC (F12)
        };
    }
});

    // --- IMPORTANTE ---
    // Se estás a carregar fotos do Supabase, tens de chamar esta função 
    // DEPOIS das fotos serem injetadas no HTML.
    
    // No teu código de listar fotos, no final do loop data.forEach, adiciona:
    // setTimeout(aplicarEfeitoScroll, 100);

    </script>
